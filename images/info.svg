<svg
  xmlns="http://www.w3.org/2000/svg"
  width="16"
  height="16"
  viewBox="0 0 16 16"
>
  <!-- 青い円 -->
  <circle
    cx="8"
    cy="8"
    r="7"
    fill="#0078D4"
  />

  <!-- 「i」の点（白） -->
  <circle
    cx="8"
    cy="5"
    r="1"
    fill="#FFFFFF"
  />

  <!-- 「i」の縦棒（白） -->
  <rect
    x="7.25"
    y="6.5"
    width="1.5"
    height="5"
    rx="0.75"
    fill="#FFFFFF"
  />
</svg>
